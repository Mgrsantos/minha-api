version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: minha-api-postgres
    environment:
      POSTGRES_DB: minha_api
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: gabsql26@
    ports:
      - "5432:5432"

  api:
    build: .
    container_name: minha-api-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/minha_api
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: gabsql26@
    depends_on:
      - postgres